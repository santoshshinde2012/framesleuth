# Framesleuth backend-only Docker Compose stack.
#
#   docker compose up        # also loads docker-compose.override.yml when present
#   curl http://127.0.0.1:8010/v1/healthz
#
# This base file contains only the Framesleuth API and shared backend data. The
# default override file adds the optional Ollama server, model-pull init job, and
# Ollama model volume for the one-command local stack.
#
# To run only the backend against a native/external model server:
#
#   docker compose -f docker-compose.yml up
#
# By default, backend-only mode reaches native Ollama on the host at
# http://host.docker.internal:11434. Override VLM_URL/CODER_URL as needed.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: framesleuth-backend:latest
    pull_policy: build # locally built; don't try to pull from a registry
    container_name: framesleuth-backend
    ports:
      - "8010:8000" # host 8010 -> container 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BACKEND_HOST=0.0.0.0
      - LOG_LEVEL=INFO
      # Backend-only mode expects a model server outside Compose.
      - VLM_URL=${VLM_URL:-http://host.docker.internal:11434}
      - VLM_MODEL=${VLM_MODEL:-qwen2.5vl}
      - CODER_URL=${CODER_URL:-http://host.docker.internal:11434}
      - CODER_MODEL=${CODER_MODEL:-qwen2.5-coder:7b}
    volumes:
      - ./bug-reports:/app/bug-reports # analysis output persists on the host
      - hf_cache:/root/.cache/huggingface # faster-whisper cache, reused across runs
    restart: unless-stopped

volumes:
  hf_cache:
    driver: local
