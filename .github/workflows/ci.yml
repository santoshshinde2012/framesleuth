name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint with ruff
        run: ruff check framesleuth tests

      - name: Format check with black
        run: black --check framesleuth tests

      - name: Type check with mypy
        run: mypy --strict framesleuth

      - name: Security scan with bandit
        run: |
          pip install bandit
          bandit -r framesleuth -f json -o bandit-report.json || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=framesleuth --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config -q

      - name: Build backend image
        run: docker build -t framesleuth-backend:ci .

      # Import the heavy runtime deps inside the image — catches missing system
      # libraries (e.g. opencv's libGL) and packaging regressions before release.
      # Also asserts the HTML→video render stack is ready (Playwright + ffmpeg +
      # a Chromium build), so the feature can't ship broken in the image.
      - name: Verify image can import the runtime stack
        run: |
          docker run --rm framesleuth-backend:ci python -c "import cv2, av, faster_whisper, framesleuth.service.api; print('runtime OK')"
          docker run --rm framesleuth-backend:ci python -c "from framesleuth.pipeline.html_render import render_availability; a=render_availability(); print(a); assert a['ready'], a"

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc || true
