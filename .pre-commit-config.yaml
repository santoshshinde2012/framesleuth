repos:
  # Code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        # No interpreter pin: black's output target is declared in pyproject
        # (tool.black target-version = py311), so the hook runs under whatever
        # python3 a contributor has. Pinning python3.11 broke setup for anyone
        # without that exact minor installed.
        language_version: python3

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black"]

  # Linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        args: ["--fix"]

  # Type checking. Runs in the project's own virtualenv (a local/system hook)
  # rather than mirrors-mypy's isolated env, which is the approach mypy itself
  # recommends when the code imports third-party libs: only there can mypy see
  # fastapi/aiohttp/uvicorn/etc. and check against the real installed versions.
  # `mypy` must be on PATH at commit time — i.e. the project venv active, which
  # is the documented dev setup (pip install -e '.[dev]').
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, project venv)
        entry: mypy
        language: system
        types: [python]
        args: ["--strict"]
        require_serial: true
        exclude: ^tests/

  # Trailing whitespace and EOL
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  # Security scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks
    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [mypy]  # Skip in CI, run separately with pytest
  submodules: false
