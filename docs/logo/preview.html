<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{margin:0;font-family:'Hanken Grotesk',system-ui,sans-serif;background:#F6F3EC;color:#1B1814;padding:48px}
.row{display:flex;align-items:center;gap:40px;flex-wrap:wrap;margin-bottom:40px}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px}
.lbl{font-family:'JetBrains Mono',monospace;font-size:12px;color:#7A7066}
.dark{background:#123A34;padding:24px;border-radius:16px}
.light{background:#fff;padding:24px;border-radius:16px;border:1px solid #E7E2D7}
img{display:block}
</style></head><body>
<h2 style="letter-spacing:-0.02em">Framesleuth logo — exports</h2>
<div class="row">
  <div class="cell"><img src="framesleuth-logo-128.png" width="128" height="128"><span class="lbl">tile 128</span></div>
  <div class="cell"><img src="framesleuth-logo-256.png" width="96" height="96"><span class="lbl">tile 96</span></div>
  <div class="cell"><img src="framesleuth-logo-512.png" width="56" height="56"><span class="lbl">tile 56</span></div>
  <div class="cell"><img src="framesleuth-logo-512.png" width="32" height="32"><span class="lbl">tile 32</span></div>
</div>
<div class="row">
  <div class="cell"><div class="light"><img src="framesleuth-logo-glyph-512.png" width="120" height="120"></div><span class="lbl">glyph on white</span></div>
  <div class="cell"><div class="dark"><img src="framesleuth-logo-glyph-512.png" width="120" height="120"></div><span class="lbl">glyph on teal</span></div>
  <div class="cell"><div style="display:flex;align-items:center;gap:14px"><img src="framesleuth-logo-256.png" width="48" height="48"><span style="font-size:26px;font-weight:700;letter-spacing:-0.02em">Framesleuth</span></div><span class="lbl">lockup</span></div>
</div>
</body></html>
